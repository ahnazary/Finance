name: Financial Data ETL

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

env:
  PG_NEON_FINANCE_URL: ${{ secrets.PG_NEON_FINANCE_URL }}

jobs:
  income-stmt:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r finance/requirements.txt
      - name: Run income statement ETL
        run: PYTHONPATH=. python -m finance.src.run_financial_etl --table income_stmt --max-batches 20

  cash-flow:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r finance/requirements.txt
      - name: Run cash flow ETL
        run: PYTHONPATH=. python -m finance.src.run_financial_etl --table cash_flow --max-batches 20

  balance-sheet:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r finance/requirements.txt
      - name: Run balance sheet ETL
        run: PYTHONPATH=. python -m finance.src.run_financial_etl --table balance_sheet --max-batches 20

  financials:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r finance/requirements.txt
      - name: Run financials ETL
        run: PYTHONPATH=. python -m finance.src.run_financial_etl --table financials --max-batches 20
