name: Check Active Tickers

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 */6 * * *'

env:
  PG_NEON_FINANCE_URL: ${{ secrets.PG_NEON_FINANCE_URL }}

jobs:
  check-active-tickers:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r finance/requirements.txt

      - name: Run active tickers check
        run: PYTHONPATH=. python -m finance.src.run_active_tickers_check --mode single --threads 30
