<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" font-family="Inter, -apple-system, Arial, sans-serif">
  <!-- Dark background -->
  <rect width="880" height="480" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-size="18" font-weight="600" fill="#e2e8f0">Finance Data Pipeline — Architecture</text>

  <!-- Stage 1: Data Source -->
  <rect x="40" y="75" width="180" height="90" fill="#1e293b" stroke="#334155" stroke-width="1.5" rx="10"/>
  <text x="130" y="108" text-anchor="middle" font-size="11" font-weight="600" fill="#7dd3fc">Data Source</text>
  <text x="130" y="130" text-anchor="middle" font-size="10" fill="#cbd5e1">tickers_list.xlsx</text>
  <text x="130" y="148" text-anchor="middle" font-size="9" fill="#64748b">106,328 tickers</text>

  <!-- Arrow 1 -->
  <line x1="220" y1="120" x2="270" y2="120" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowDark)"/>

  <!-- Stage 2: Active Tickers Check -->
  <rect x="270" y="65" width="210" height="110" fill="#1e293b" stroke="#334155" stroke-width="1.5" rx="10"/>
  <text x="375" y="95" text-anchor="middle" font-size="11" font-weight="600" fill="#7dd3fc">Active Tickers Check</text>
  <text x="375" y="118" text-anchor="middle" font-size="10" fill="#cbd5e1">ThreadPoolExecutor</text>
  <text x="375" y="136" text-anchor="middle" font-size="10" fill="#cbd5e1">30 threads × 100 batch</text>
  <text x="375" y="158" text-anchor="middle" font-size="9" fill="#64748b">Short-circuit on first valid response</text>

  <!-- Arrow 2 -->
  <line x1="480" y1="120" x2="530" y2="120" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowDark)"/>

  <!-- Stage 3: Financial Data ETL -->
  <rect x="530" y="65" width="210" height="110" fill="#1e293b" stroke="#334155" stroke-width="1.5" rx="10"/>
  <text x="635" y="95" text-anchor="middle" font-size="11" font-weight="600" fill="#7dd3fc">Financial Data ETL</text>
  <text x="635" y="118" text-anchor="middle" font-size="10" fill="#cbd5e1">4 parallel jobs</text>
  <text x="635" y="136" text-anchor="middle" font-size="10" fill="#cbd5e1">10 threads × 50 batch</text>
  <text x="635" y="158" text-anchor="middle" font-size="9" fill="#64748b">New tickers first, then oldest</text>

  <!-- Arrow 3 -->
  <line x1="740" y1="120" x2="780" y2="120" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowDark)"/>

  <!-- Database -->
  <rect x="780" y="75" width="80" height="90" fill="#1e293b" stroke="#334155" stroke-width="1.5" rx="10"/>
  <text x="820" y="112" text-anchor="middle" font-size="11" font-weight="600" fill="#7dd3fc">Neon</text>
  <text x="820" y="130" text-anchor="middle" font-size="11" font-weight="600" fill="#7dd3fc">PG</text>
  <text x="820" y="150" text-anchor="middle" font-size="9" fill="#64748b">500MB</text>

  <!-- Tables Section -->
  <rect x="40" y="210" width="800" height="250" fill="#1e293b" stroke="#334155" stroke-width="1" rx="10"/>
  <text x="440" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#e2e8f0">Database Tables — finance schema</text>

  <!-- active_tickers -->
  <rect x="65" y="260" width="200" height="130" fill="#0f172a" stroke="#334155" stroke-width="1" rx="8"/>
  <text x="165" y="286" text-anchor="middle" font-size="11" font-weight="600" fill="#7dd3fc">active_tickers</text>
  <text x="85" y="308" font-size="9" fill="#94a3b8">ticker (PK) VARCHAR(20)</text>
  <text x="85" y="324" font-size="9" fill="#94a3b8">name VARCHAR</text>
  <text x="85" y="340" font-size="9" fill="#94a3b8">exchange VARCHAR</text>
  <text x="85" y="356" font-size="9" fill="#94a3b8">is_active BOOLEAN</text>
  <text x="85" y="372" font-size="9" fill="#94a3b8">upsert_datetime TIMESTAMP</text>
  <text x="165" y="388" text-anchor="middle" font-size="9" fill="#64748b">~106K rows</text>

  <!-- income_stmt -->
  <rect x="290" y="260" width="175" height="130" fill="#0f172a" stroke="#334155" stroke-width="1" rx="8"/>
  <text x="377" y="286" text-anchor="middle" font-size="11" font-weight="600" fill="#7dd3fc">income_stmt</text>
  <text x="310" y="308" font-size="9" fill="#94a3b8">ticker VARCHAR</text>
  <text x="310" y="324" font-size="9" fill="#94a3b8">frequency VARCHAR</text>
  <text x="310" y="340" font-size="9" fill="#94a3b8">report_date DATE</text>
  <text x="310" y="356" font-size="9" fill="#94a3b8">metric VARCHAR</text>
  <text x="310" y="372" font-size="9" fill="#94a3b8">value FLOAT</text>
  <text x="310" y="388" font-size="9" fill="#94a3b8">insert_datetime TIMESTAMP</text>

  <!-- cash_flow -->
  <rect x="490" y="260" width="160" height="55" fill="#0f172a" stroke="#334155" stroke-width="1" rx="8"/>
  <text x="570" y="286" text-anchor="middle" font-size="11" font-weight="600" fill="#7dd3fc">cash_flow</text>
  <text x="570" y="304" text-anchor="middle" font-size="9" fill="#64748b">(same schema)</text>

  <!-- balance_sheet -->
  <rect x="490" y="325" width="160" height="55" fill="#0f172a" stroke="#334155" stroke-width="1" rx="8"/>
  <text x="570" y="351" text-anchor="middle" font-size="11" font-weight="600" fill="#7dd3fc">balance_sheet</text>
  <text x="570" y="369" text-anchor="middle" font-size="9" fill="#64748b">(same schema)</text>

  <!-- financials -->
  <rect x="675" y="260" width="140" height="55" fill="#0f172a" stroke="#334155" stroke-width="1" rx="8"/>
  <text x="745" y="286" text-anchor="middle" font-size="11" font-weight="600" fill="#7dd3fc">financials</text>
  <text x="745" y="304" text-anchor="middle" font-size="9" fill="#64748b">(same schema)</text>

  <!-- GitHub Actions row -->
  <rect x="490" y="390" width="325" height="55" fill="#0f172a" stroke="#334155" stroke-width="1" rx="8"/>
  <text x="652" y="414" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8">GitHub Actions</text>
  <text x="652" y="432" text-anchor="middle" font-size="9" fill="#64748b">Scheduled every 6 hours</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowDark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
